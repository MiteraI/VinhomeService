<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
            crossorigin="anonymous"></script>
</head>
<body>
<div class="container">
    <form id="search">
        <select id="status">
            <option value="0">All</option>
            <option value="1">Approve</option>
            <option value="2">Reject</option>
        </select>
        <input type="submit">
    </form>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Image Related</th>
        </tr>
        </thead>
        <tbody id="tbody-leave-reports">

        </tbody>
    </table>
</div>

<script>
    fetch("/api/leave-report-by-worker")
        .then (res => res.json())
        .then (data => {
            let output = ''
            data.forEach(item => {
                const startDate = item['startTime'];
                const endDate = item['endTime'];
                const reason = item['reason'];
                const status = item['status'];
                const imgURl = item['fileURL'];

                output +=
                    `
                        <tr>
                            <td>${startDate}</td>
                            <td>${endDate}</td>
                            <td>${reason}</td>
                            `
                            if (status === 1) {
                                output +=
                                    ` <td>Approve</td>`
                            }
                            else if (status === 0) {
                                output +=
                                    `<td>Pending</td>`
                            }
                            else {
                                output +=
                                    `<td>Reject</td>`
                            }
                            output +=
                        `
                            `
                                if (imgURl != null) {
                                    output +=
                                        `<td><a href="${imgURl}" style="text-decoration: none">Link Image</a></td>`
                                }
                                output +=
                            `
                        </tr>
                    `
            })
            document.getElementById("tbody-leave-reports").innerHTML = output;
        })
</script>
<script>
    document.getElementById("search").addEventListener("submit", function () {
        const data = document.getElementById("status").value;
        var formData = new FormData();
        formData.append("status", data);
        fetch("/api/leave-report-by-worker-status", {
            method: 'POST',
            body: formData
        })
            .then (res => {
                if (res.status === 200) {
                    window.location.reload();
                }
                else {
                    alert("Something wrong");
                }
            })
            .catch(err => {
                alert(err);
            })
    })
</script>
</body>
</html>
